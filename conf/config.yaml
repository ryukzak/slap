  - id: "task4"
    title: "Lab 4"
    description: |
      # Graph Algorithms

      Implement and analyze common graph algorithms including:

      ## Required Implementations

      * **Depth-First Search (DFS)**
        ```go
        func DFS(graph Graph, start Vertex) {
            visited := make(map[Vertex]bool)
            dfsUtil(graph, start, visited)
        }

        func dfsUtil(graph Graph, vertex Vertex, visited map[Vertex]bool) {
            // Mark the current node as visited and print it
            visited[vertex] = true
            fmt.Println(vertex)

            // Recur for all the vertices adjacent to this vertex
            for _, adjacent := range graph.GetAdjacent(vertex) {
                if !visited[adjacent] {
                    dfsUtil(graph, adjacent, visited)
                }
            }
        }
        ```

      * **Breadth-First Search (BFS)**
      * **Shortest Path Algorithms**
        - Dijkstra's Algorithm
        - Bellman-Ford Algorithm

      ## Analysis Requirements

      For each algorithm:

      1. Describe the time and space complexity
      2. Identify optimal use cases
      3. Discuss limitations and potential optimizations

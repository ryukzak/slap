{{define "title"}}Settings{{end}}
{{define "header"}}
<span class="text-gray-500 hidden sm:inline">·</span>
<a class="text-gray-300 hover:text-white" href="/user/{{.UserID}}">//&nbsp;me:&nbsp;{{.Username}}</a>
<span class="text-gray-500 hidden sm:inline">·</span>
<span>//&nbsp;settings</span>
{{end}}
{{define "content"}}
<div class="container mx-auto p-4 max-w-lg space-y-8">
  {{if .Error}}
  <div class="bg-red-900 border border-red-700 text-red-100 px-4 py-3 rounded">
    <p>
      {{.Error}}
    </p>
  </div>
  {{end}}
  {{if .Success}}
  <div class="bg-green-900 border border-green-700 text-green-100 px-4 py-3 rounded">
    <p>
      {{.Success}}
    </p>
  </div>
  {{end}}
  <div>
    <h2 class="text-sm font-semibold border-b border-gray-700 pb-1 mb-3">
      // display name
    </h2>
    <form method="post"
          action="/user/{{.UserID}}/settings/username"
          class="space-y-3">
      <div>
        <label for="username" class="block text-sm mb-1">
          Name:
        </label>
        <input type="text"
               id="username"
               name="username"
               value="{{.Username}}"
               required
               class="bg-gray-800 border border-gray-700 text-gray-300 text-sm w-full p-2 rounded" />
      </div>
      <button type="submit"
              class="bg-blue-800 hover:bg-blue-700 text-xs px-3 py-1 rounded">
        [save name]
      </button>
    </form>
  </div>
  <div>
    <h2 class="text-sm font-semibold border-b border-gray-700 pb-1 mb-3">
      // change password
    </h2>
    <form method="post"
          action="/user/{{.UserID}}/settings/password"
          class="space-y-3">
      <div>
        <label for="current_password" class="block text-sm mb-1">
          Current Password:
        </label>
        <input type="password"
               id="current_password"
               name="current_password"
               required
               class="bg-gray-800 border border-gray-700 text-gray-300 text-sm w-full p-2 rounded" />
      </div>
      <div>
        <label for="new_password" class="block text-sm mb-1">
          New Password:
        </label>
        <input type="password"
               id="new_password"
               name="new_password"
               required
               class="bg-gray-800 border border-gray-700 text-gray-300 text-sm w-full p-2 rounded" />
      </div>
      <button type="submit"
              class="bg-blue-800 hover:bg-blue-700 text-xs px-3 py-1 rounded">
        [change password]
      </button>
    </form>
  </div>
</div>
{{end}}
{{define "footer_nav"}}
<span class="text-gray-500 hidden sm:inline">·</span>
<a class="text-blue-400 hover:text-blue-300" href="/user/{{.UserID}}">[back]</a>
<span class="text-gray-500 hidden sm:inline">·</span>
<a class="text-blue-400 hover:text-blue-300" href="/logout">[logout]</a>
{{end}}
